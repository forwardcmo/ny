<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>NewYork.com — Investor Access</title>
<meta name="viewport" content="width=device-width, initial-scale=1" />
<meta name="robots" content="noindex,nofollow" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Newsreader:ital,opsz,wght@0,6..72,300;0,6..72,400;0,6..72,500;1,6..72,300;1,6..72,400&family=JetBrains+Mono:wght@300;400;500&display=swap" rel="stylesheet" />
<style>
  :root{--ink:#0E1E3A;--cream:#F1E8D2;--cream-mute:rgba(241,232,210,0.7);--gold:#C8AC6D;--serif:"Newsreader",Georgia,serif;--mono:"JetBrains Mono",monospace}
  *{margin:0;padding:0;box-sizing:border-box}
  html,body{height:100%}
  body{background:var(--ink);color:var(--cream);font-family:var(--serif);display:flex;align-items:center;justify-content:center;min-height:100vh;padding:40px;position:relative;overflow:hidden}
  body::before{content:"";position:absolute;top:-25%;right:-15%;width:720px;height:720px;border-radius:50%;background:radial-gradient(circle at center,rgba(200,172,109,0.2),transparent 68%);z-index:0}
  .gatewrap{position:relative;z-index:1;width:100%;max-width:460px;text-align:center}
  .brand{font-family:var(--serif);font-weight:300;font-size:32px;letter-spacing:-0.02em}
  .brand .tld{color:var(--gold);font-style:italic}
  .eyebrow{font-family:var(--mono);font-size:11px;letter-spacing:0.28em;text-transform:uppercase;color:var(--gold);display:inline-flex;align-items:center;gap:14px;margin-top:44px}
  .eyebrow::before,.eyebrow::after{content:"";width:34px;height:1px;background:var(--gold)}
  h1{font-family:var(--serif);font-weight:300;font-size:clamp(34px,6vw,50px);line-height:1.02;letter-spacing:-0.02em;margin-top:22px}
  h1 em{font-style:italic;color:var(--gold)}
  p.sub{font-family:var(--serif);font-weight:300;font-size:18px;line-height:1.55;color:var(--cream-mute);margin-top:20px;text-wrap:pretty}
  form{margin-top:40px}
  .codewrap{position:relative;display:inline-block}
  .codewrap input{position:absolute;inset:0;width:100%;height:100%;opacity:0;border:0;padding:0;margin:0;cursor:text;font-size:16px}
  .boxes{display:flex;justify-content:center;gap:14px;pointer-events:none}
  .boxes .box{width:60px;height:76px;display:flex;align-items:center;justify-content:center;font-family:var(--serif);font-weight:300;font-size:38px;color:var(--cream);background:rgba(241,232,210,0.05);border:1px solid rgba(241,232,210,0.28);transition:all .25s}
  .codewrap.focus .boxes .box.active{border-color:var(--gold);background:rgba(200,172,109,0.08)}
  .codewrap.err .boxes .box{border-color:#C0554E;animation:shake .4s}
  @keyframes shake{0%,100%{transform:translateX(0)}20%,60%{transform:translateX(-7px)}40%,80%{transform:translateX(7px)}}
  .msg{font-family:var(--mono);font-size:11px;letter-spacing:0.14em;text-transform:uppercase;color:#D98A83;margin-top:20px;height:14px;opacity:0;transition:opacity .2s}
  .msg.show{opacity:1}
  button{margin-top:26px;width:100%;font-family:var(--mono);font-size:12px;letter-spacing:0.2em;text-transform:uppercase;color:var(--ink);background:var(--gold);border:1px solid var(--gold);padding:17px;cursor:pointer;transition:all .3s;display:inline-flex;align-items:center;justify-content:center;gap:12px}
  button:hover{background:var(--ink);color:var(--cream)}
  button .arr{font-family:var(--serif);font-style:italic;font-size:17px;letter-spacing:0}
  .foot{font-family:var(--mono);font-size:10px;letter-spacing:0.16em;text-transform:uppercase;color:rgba(241,232,210,0.4);margin-top:44px}
</style>
</head>
<body>
  <div class="gatewrap">
    <div class="brand">NewYork<span class="tld">.com</span></div>
    <div class="eyebrow">Confidential</div>
    <h1>Enter your <em>access code.</em></h1>
    <p class="sub">This investor materials portal is private. Enter the four-digit code you were provided to continue.</p>
    <form id="gateForm" autocomplete="off" novalidate>
      <div class="codewrap" id="codewrap">
        <input id="code" type="text" inputmode="numeric" maxlength="4" autocomplete="off" autofocus aria-label="Four-digit access code" />
        <div class="boxes" aria-hidden="true">
          <div class="box"></div>
          <div class="box"></div>
          <div class="box"></div>
          <div class="box"></div>
        </div>
      </div>
      <div class="msg" id="msg">Incorrect code — please try again</div>
      <button type="submit">Enter <span class="arr">→</span></button>
    </form>
    <div class="foot">Confidential · Not an offer to sell securities</div>
  </div>
<script>
  var CODE="6920";
  if(sessionStorage.getItem('nyc_gate')==='1'){location.replace('home.html');}
  var wrap=document.getElementById('codewrap');
  var code=document.getElementById('code');
  var boxes=[].slice.call(wrap.querySelectorAll('.box'));
  var msg=document.getElementById('msg');
  function render(){
    var v=code.value, focused=document.activeElement===code;
    wrap.classList.toggle('focus',focused);
    boxes.forEach(function(b,i){
      b.textContent=v[i]||'';
      var active=focused&&(i===v.length||(v.length===4&&i===3));
      b.classList.toggle('active',active);
    });
  }
  function fail(){wrap.classList.add('err');msg.classList.add('show');code.value='';render();code.focus();}
  function attempt(){
    if(code.value.length<4)return;
    if(code.value===CODE){sessionStorage.setItem('nyc_gate','1');window.location.href='home.html';}
    else{fail();}
  }
  code.addEventListener('input',function(){
    code.value=code.value.replace(/[^0-9]/g,'').slice(0,4);
    wrap.classList.remove('err');msg.classList.remove('show');
    render();
    if(code.value.length===4)attempt();
  });
  code.addEventListener('focus',render);
  code.addEventListener('blur',render);
  wrap.addEventListener('mousedown',function(e){e.preventDefault();code.focus();});
  document.getElementById('gateForm').addEventListener('submit',function(e){e.preventDefault();attempt();});
  code.focus();render();
</script>
</body>
</html>
